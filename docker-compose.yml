services:
  premiere-connexion:
    container_name: premiere-connexion
    image: ghcr.io/jturazzi/premiere-connexion:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - storage-data:/var/www/html/storage
    environment:
      # Application
      APP_NAME: "Première connexion"
      APP_ENV: production
      APP_KEY: ""
      APP_URL: "http://localhost"

      # LDAP (Active Directory) - flux de première connexion
      LDAP_CONNECTION: "default"
      LDAP_HOST: "votredc.company.lan"
      LDAP_USERNAME: "svc-test@company.lan"
      LDAP_PASSWORD: ""
      LDAP_PORT: "636"
      LDAP_BASE_DN: "OU=Utilisateurs,DC=company,DC=lan"
      LDAP_TIMEOUT: "5"
      LDAP_USE_LDAPS: "true"
      LDAP_STARTTLS: "false"
      LDAP_SASL: "false"
      LDAP_LOGGING: "true"

    command: ["frankenphp", "run"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  storage-data:
    driver: local